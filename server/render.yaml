# Render Blueprint for Linier CRM Backend
services:
  - type: web
    name: linier-crm-server
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linier-crm-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: linier-crm-db
    databaseName: linier_crm
    user: linier
